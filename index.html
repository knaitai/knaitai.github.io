<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KnaiTai — Knowledge-native AI</title>

  <meta
    name="description"
    content="KnaiTai is open infrastructure for making knowledge native to AI systems."
  />

  <style>
    :root {
      --background: #f7f8fa;
      --surface: rgba(255, 255, 255, 0.82);
      --text: #10213f;
      --muted: #5d687b;
      --accent: #1473e6;
      --accent-dark: #0c4fa3;
      --border: rgba(16, 33, 63, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(
          circle at 75% 25%,
          rgba(20, 115, 230, 0.12),
          transparent 32rem
        ),
        radial-gradient(
          circle at 20% 85%,
          rgba(39, 174, 150, 0.08),
          transparent 28rem
        ),
        var(--background);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: min(1120px, calc(100% - 48px));
      margin: 0 auto;
      padding: 30px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 1.15rem;
      font-weight: 750;
      letter-spacing: -0.02em;
    }

    .github-link {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      transition: color 160ms ease;
    }

    .github-link:hover {
      color: var(--accent);
    }

    main {
      flex: 1;
      width: min(1120px, calc(100% - 48px));
      margin: 0 auto;
      display: grid;
      place-items: center;
      padding: 70px 0 110px;
    }

    .hero {
      max-width: 850px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--accent-dark);
      font-size: 0.78rem;
      font-weight: 750;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(20, 115, 230, 0.1);
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 11vw, 8rem);
      line-height: 0.9;
      letter-spacing: -0.075em;
      font-weight: 800;
    }

    .tagline {
      margin: 34px auto 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.8rem, 4.5vw, 3.2rem);
      line-height: 1.15;
      letter-spacing: -0.035em;
      font-weight: 500;
    }

    .tagline span {
      color: var(--accent);
    }

    .description {
      max-width: 670px;
      margin: 28px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.75;
    }

    .actions {
      margin-top: 42px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .button {
      min-width: 155px;
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      transition:
        transform 160ms ease,
        box-shadow 160ms ease,
        background 160ms ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button-primary {
      color: white;
      background: var(--text);
      box-shadow: 0 12px 30px rgba(16, 33, 63, 0.16);
    }

    .button-primary:hover {
      background: var(--accent-dark);
    }

    .button-secondary {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      backdrop-filter: blur(12px);
    }

    .button-secondary:hover {
      border-color: rgba(20, 115, 230, 0.3);
      box-shadow: 0 10px 25px rgba(16, 33, 63, 0.08);
    }

    .principles {
      margin: 58px auto 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px 22px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 650;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .principles span:not(:last-child)::after {
      content: "·";
      margin-left: 22px;
      color: var(--accent);
    }

    footer {
      width: min(1120px, calc(100% - 48px));
      margin: 0 auto;
      padding: 24px 0 32px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 20px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      header {
        width: min(100% - 32px, 1120px);
        padding-top: 22px;
      }

      main {
        width: min(100% - 32px, 1120px);
        padding-top: 40px;
      }

      h1 {
        letter-spacing: -0.06em;
      }

      .principles {
        display: grid;
      }

      .principles span::after {
        display: none;
      }

      footer {
        width: min(100% - 32px, 1120px);
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header>
      <a class="brand" href="#">KnaiTai</a>

      <a
        class="github-link"
        href="knaitai.github.io"
        target="_blank"
        rel="noopener noreferrer"
      >
        GitHub ↗
      </a>
    </header>

    <main>
      <section class="hero">
        <div class="eyebrow">Open-source infrastructure</div>

        <h1>KnaiTai</h1>

        <p class="tagline">
          Knowledge-native AI.<br />
          <span>Open, by design.</span>
        </p>

        <p class="description">
          Making knowledge programmable for AI.
        </p>

        <div class="actions">
          <a
            class="button button-primary"
            href="knaitai.gihub.io"
          >
            Explore KnaiTai
          </a>

          <a class="button button-secondary" href="#vision">
            Read the vision
          </a>
        </div>

        <div class="principles" id="vision">
          <span>Assimilate</span>
          <span>Subset</span>
          <span>Compile</span>
          <span>Converse</span>
          <span>Verify</span>
        </div>
      </section>
    </main>

    <footer>
      <span>KnaiTai</span>
      <span>Making knowledge programmable for AI.</span>
    </footer>
  </div>
</body>
</html>
